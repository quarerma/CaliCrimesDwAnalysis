name: "cali_crimes_dw"
version: "1.0.0"
config-version: 2

# This profile lives in dbt/profiles.yml (run dbt with --profiles-dir .)
profile: "cali_crimes_dw"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  cali_crimes_dw:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
